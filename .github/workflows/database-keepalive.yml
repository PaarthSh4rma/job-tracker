name: Database keep-alive

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  database-health:
    runs-on: ubuntu-latest
    steps:
      - name: Check database health
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          test -n "$HEALTHCHECK_URL"
          curl \
            --fail \
            --show-error \
            --silent \
            --location \
            --connect-timeout 15 \
            --max-time 120 \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 10 \
            "$HEALTHCHECK_URL"
